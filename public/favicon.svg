<svg
  width="32"
  height="32"
  viewBox="0 0 48 48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="ctro-favicon-gradient"
      x1="8"
      y1="6"
      x2="40"
      y2="42"
    >
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect
    x="4"
    y="4"
    width="40"
    height="40"
    rx="12"
    fill="url(#ctro-favicon-gradient)"
  />

  <!-- Layer stack (env concept) -->
  <rect
    x="14"
    y="16"
    width="20"
    height="4"
    rx="2"
    fill="white"
    opacity="0.95"
  />

  <rect
    x="14"
    y="23"
    width="14"
    height="4"
    rx="2"
    fill="white"
    opacity="0.8"
  />

  <rect
    x="14"
    y="30"
    width="10"
    height="4"
    rx="2"
    fill="white"
    opacity="0.65"
  />

  <!-- Active indicator -->
  <circle cx="34" cy="32" r="3" fill="#22C55E" />
</svg>